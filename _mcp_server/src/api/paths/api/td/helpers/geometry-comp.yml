post:
  summary: Create a Geometry COMP with In/Out operators
  description: |
    Create a Geometry COMP with In and Out operators inside it.
    Wraps the td_helpers.network.setup_geometry_comp() helper.
  operationId: create_geometry_comp
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - parentPath
          properties:
            parentPath:
              type: string
              description: "Path to the parent node (e.g., /project1)"
            name:
              type: string
              default: geo1
              description: Name for the geometry COMP
            x:
              type: integer
              default: 0
              description: X position in the network
            "y":
              type: integer
              default: 0
              description: Y position in the network
            pop:
              type: boolean
              default: false
              description: Whether to use POP (point) topology instead of SOP
  responses:
    "200":
      description: Geometry COMP created successfully
      content:
        application/json:
          schema:
            type: object
            required:
              - success
              - data
              - error
            properties:
              success:
                type: boolean
                description: Whether the operation was successful
              data:
                type: object
                nullable: true
                description: Created geometry COMP details
              error:
                type: string
                nullable: true
                description: Error message if the operation was not successful
