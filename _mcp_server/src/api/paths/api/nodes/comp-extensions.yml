get:
  summary: Get COMP extension methods and properties
  description: >
    Return extension classes, methods, and properties for a COMP. Useful
    for discovering custom Python extensions on components.
  operationId: get_comp_extensions
  parameters:
    - name: compPath
      description: 'Absolute path to the COMP. e.g., "/project1/base1"'
      in: query
      required: true
      schema:
        type: string
    - name: includeDocs
      description: Include method docstrings (truncated to 500 chars)
      in: query
      required: false
      schema:
        type: boolean
        default: false
    - name: maxMethods
      description: Maximum methods per extension
      in: query
      required: false
      schema:
        type: integer
        default: 50
  responses:
    "200":
      description: COMP extension info
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
              data:
                type: object
                properties:
                  compPath:
                    type: string
                  extensions:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        methodCount:
                          type: integer
                        propertyCount:
                          type: integer
                        methods:
                          type: array
                          items:
                            type: object
                            properties:
                              name:
                                type: string
                              signature:
                                type: string
                              doc:
                                type: string
                        properties:
                          type: array
                          items:
                            type: object
                            properties:
                              name:
                                type: string
                              type:
                                type: string
              error:
                type: string
                nullable: true
