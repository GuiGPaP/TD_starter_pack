# docker-compose.dev.yml - Development mode without hardware requirements

networks:
  lidar_network:
    driver: bridge

services:
  sllidar:
    build:
      context: .
      target: runtime
      args:
        - BUILDKIT_INLINE_CACHE=1
    container_name: sllidar_ros2_dev
    networks:
      - lidar_network
    user: "1001:1001"
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    volumes:
      # Development: mount source as read-write for hot reload
      - ./sllidar_ros2:/ros2_ws/src/sllidar_ros2:rw
      - ./osc_bridge:/ros2_ws/osc_bridge:rw
      - ./launch:/ros2_ws/launch:rw
      - lidar_data:/var/lib/lidar

    # No device mounting in dev mode - allows testing without hardware

    environment:
      - PYTHONUNBUFFERED=1
      - ROS_DOMAIN_ID=0
      - LOG_LEVEL=${LOG_LEVEL:-DEBUG}
      - DEVELOPMENT_MODE=true

    ports:
      - "${OSC_PORT:-7000}:${OSC_PORT:-7000}/udp"

    # Health check
    healthcheck:
      test: ["CMD", "pgrep", "-f", "osc_bridge_node"]
      interval: 15s
      timeout: 5s
      retries: 2
      start_period: 30s

    restart: unless-stopped

    # Launch with OSC bridge — pass env vars as launch args
    command: >
      ros2 launch /ros2_ws/launch/sllidar_osc_launch.py
      channel_type:=${LIDAR_CHANNEL_TYPE:-serial}
      serial_port:=${LIDAR_SERIAL_PORT:-/dev/ttyUSB0}
      serial_baudrate:=${LIDAR_BAUDRATE:-115200}
      tcp_ip:=${LIDAR_TCP_IP:-192.168.0.7}
      tcp_port:=${LIDAR_TCP_PORT:-20108}
      udp_ip:=${LIDAR_UDP_IP:-192.168.11.2}
      udp_port:=${LIDAR_UDP_PORT:-8089}
      scan_mode:=${LIDAR_SCAN_MODE:-}
      osc_host:=${OSC_HOST:-host.docker.internal}
      osc_port:=${OSC_PORT:-7000}
      osc_format:=${OSC_FORMAT:-polar}

volumes:
  lidar_data:
