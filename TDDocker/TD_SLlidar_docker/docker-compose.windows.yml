# docker-compose.windows.yml - Windows with hardware (WSL2 USB forwarding)

networks:
  lidar_network:
    driver: bridge

services:
  sllidar:
    build: .
    container_name: sllidar_ros2
    networks:
      - lidar_network
    user: "1001:1001"
    cap_drop:
      - ALL
    cap_add:
      - CAP_DAC_OVERRIDE  # For device access
    group_add:
      - dialout  # Access /dev/ttyUSB*
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    volumes:
      - ./sllidar_ros2:/ros2_ws/src/sllidar_ros2:ro
      - lidar_data:/var/lib/lidar

    # Windows device mapping — requires usbipd WSL attach
    devices:
      - /dev/ttyUSB0:/dev/ttyUSB0

    environment:
      - PYTHONUNBUFFERED=1
      - ROS_DOMAIN_ID=0

    ports:
      - "${OSC_PORT:-7000}:${OSC_PORT:-7000}/udp"

    healthcheck:
      test: ["CMD", "pgrep", "-f", "osc_bridge_node"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    restart: unless-stopped

    command: >
      ros2 launch /ros2_ws/launch/sllidar_osc_launch.py
      channel_type:=${LIDAR_CHANNEL_TYPE:-serial}
      serial_port:=${LIDAR_SERIAL_PORT:-/dev/ttyUSB0}
      serial_baudrate:=${LIDAR_BAUDRATE:-115200}
      tcp_ip:=${LIDAR_TCP_IP:-192.168.0.7}
      tcp_port:=${LIDAR_TCP_PORT:-20108}
      udp_ip:=${LIDAR_UDP_IP:-192.168.11.2}
      udp_port:=${LIDAR_UDP_PORT:-8089}
      scan_mode:=${LIDAR_SCAN_MODE:-}
      osc_host:=${OSC_HOST:-host.docker.internal}
      osc_port:=${OSC_PORT:-7000}
      osc_format:=${OSC_FORMAT:-polar}

volumes:
  lidar_data:

# To use with real hardware on Windows:
# 1. Install usbipd: winget install usbipd
# 2. List USB devices: usbipd wsl list
# 3. Attach lidar: usbipd wsl attach --busid X-Y
# 4. Uncomment the devices section above
